apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowlarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/BobBlinde/KubeLab.git
    targetRevision: main
    path: manifests/prowlarr
  destination:
    server: https://kubernetes.default.svc
    namespace: prowlarr
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
